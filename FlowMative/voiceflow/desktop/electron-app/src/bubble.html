<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowMative Bubble</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        --bubble-bg: rgba(9, 16, 28, 0.9);
        --bubble-ring: rgba(255, 255, 255, 0.08);
        --bubble-shadow: rgba(3, 7, 12, 0.4);
        --text-main: #eef5ff;
        --text-muted: rgba(238, 245, 255, 0.74);
        --idle: #d8e3f2;
        --listening: #ff5f6d;
        --processing: #ffd166;
        --typing: #7ae5a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: transparent;
      }

      .bubble {
        width: 102px;
        height: 102px;
        display: grid;
        place-items: center;
        padding: 12px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.16), transparent 36%),
          linear-gradient(160deg, rgba(22, 39, 64, 0.96), var(--bubble-bg));
        border: 1px solid var(--bubble-ring);
        box-shadow:
          0 16px 34px var(--bubble-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        text-align: center;
        color: var(--text-main);
        backdrop-filter: blur(18px);
        opacity: 1;
        transform: translateY(0) scale(1);
        transition:
          opacity 180ms ease,
          transform 180ms ease,
          filter 180ms ease;
      }

      .bubble.is-hidden {
        opacity: 0;
        transform: translateY(10px) scale(0.94);
        filter: blur(1px);
      }

      .inner {
        display: grid;
        gap: 6px;
        justify-items: center;
      }

      .icon {
        margin: 0;
        font-size: 1.72rem;
        line-height: 1;
      }

      .label {
        margin: 0;
        max-width: 74px;
        color: var(--text-muted);
        font-size: 0.72rem;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .bubble[data-state="idle"] .icon {
        color: var(--idle);
      }

      .bubble[data-state="listening"] .icon {
        color: var(--listening);
        animation: pulse 1.3s infinite alternate;
      }

      .bubble[data-state="processing"] .icon {
        color: var(--processing);
        animation: spin 1s linear infinite;
      }

      .bubble[data-state="typing"] .icon {
        color: var(--typing);
        animation: bounce 0.8s ease-in-out infinite alternate;
      }

      @keyframes pulse {
        from {
          transform: scale(0.92);
          filter: drop-shadow(0 0 0 rgba(255, 95, 109, 0.2));
        }

        to {
          transform: scale(1.06);
          filter: drop-shadow(0 0 12px rgba(255, 95, 109, 0.46));
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes bounce {
        from {
          transform: translateY(0);
        }

        to {
          transform: translateY(-4px);
        }
      }
    </style>
  </head>
  <body>
    <main class="bubble is-hidden" data-state="idle">
      <div class="inner">
        <p id="icon" class="icon">&#9675;</p>
        <p id="label" class="label">Idle</p>
      </div>
    </main>

    <script src="./bubbleRenderer.js"></script>
  </body>
</html>
