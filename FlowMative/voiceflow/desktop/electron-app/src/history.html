<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowMative Command History</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f7fbff 0%, #eaf3ff 100%);
        color: #17324a;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px;
        box-sizing: border-box;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      p {
        margin: 6px 0 0;
        color: #4c647b;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
        background: #dcecff;
        color: #17324a;
      }

      button.secondary {
        background: #eef4fb;
      }

      button.danger {
        background: #ffdfe0;
        color: #7a1c24;
      }

      #history {
        display: grid;
        gap: 14px;
      }

      .empty {
        padding: 24px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 14px 34px rgba(23, 50, 74, 0.1);
        color: #58728b;
      }

      .entry {
        padding: 18px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 14px 34px rgba(23, 50, 74, 0.1);
      }

      .time {
        font-size: 0.9rem;
        font-weight: 700;
        color: #35608c;
      }

      .label {
        margin-top: 12px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #4b6886;
      }

      .value {
        margin-top: 4px;
        white-space: pre-wrap;
        line-height: 1.45;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      #status {
        min-height: 1.2rem;
        margin-bottom: 14px;
        color: #2d5f92;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Command History</h1>
          <p>Review transcripts, selected tools, and generated results.</p>
        </div>
        <button id="clearAll" class="danger">Clear All History</button>
      </header>

      <div id="status"></div>
      <div id="history"></div>
    </main>

    <script src="./historyRenderer.js"></script>
  </body>
</html>
