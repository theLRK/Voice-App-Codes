<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowMative Status</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 14px;
        box-sizing: border-box;
        display: flex;
        align-items: stretch;
        background: linear-gradient(135deg, #f6fbff 0%, #e9f3ff 100%);
        color: #15314b;
      }

      #status {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 10px 28px rgba(21, 49, 75, 0.12);
        white-space: pre-wrap;
        line-height: 1.35;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="status">Ready</div>

    <script>
      const { ipcRenderer } = require("electron");
      const statusElement = document.getElementById("status");

      ipcRenderer.on("status:update", (_event, status) => {
        statusElement.textContent = status;
      });
    </script>
  </body>
</html>
