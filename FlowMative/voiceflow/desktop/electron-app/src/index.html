<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowMative</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f5f7fb, #dfe9f3);
        color: #10233e;
      }

      main {
        max-width: 320px;
        padding: 24px;
        text-align: center;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(16, 35, 62, 0.12);
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(16, 35, 62, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      strong {
        display: block;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FlowMative</h1>
      <p>Hold <strong>CTRL + SPACE</strong> to dictate into the active application.</p>
    </main>
  </body>
  </html>
